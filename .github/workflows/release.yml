name: Release Mod

on:
    push:
        tags:
            - "v*.*.*"
    workflow_dispatch:
        inputs:
            version:
                description: "Версия релиза (например 0.1.2). Будет создан тег v<version>."
                required: true
                default: "0.1.2"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Resolve version
              id: ver
              run: |
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                    VERSION="${{ github.event.inputs.version }}"
                    VERSION="${VERSION#v}"
                    TAG="v${VERSION}"
                  else
                    TAG="${GITHUB_REF_NAME}"
                    VERSION="${TAG#v}"
                  fi
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
                  echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
                  echo "Resolved version=${VERSION}, tag=${TAG}"

            - name: Checkout mod source (main)
              uses: actions/checkout@v4
              with:
                  ref: main
                  fetch-depth: 0
                  path: LK_Ugrumiy_WP

            # Версия выставляется в build.txt только для этой сборки — изменения
            # НЕ коммитятся обратно в репо, чтобы релиз не создавал шум в истории
            # main и не требовал git pull от разработчиков. README не трогаем вовсе.
            - name: Set build.txt version (release-only, not committed)
              working-directory: LK_Ugrumiy_WP
              env:
                  VERSION: ${{ steps.ver.outputs.version }}
              run: |
                  set -eu
                  echo "Building with version ${VERSION} (workspace-only edit)"
                  sed -i -E "s/^version\s*=.*/version = ${VERSION}/" build.txt
                  echo "--- build.txt ---"
                  cat build.txt

            - name: Setup .NET 8.0
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 8.0.x

            - name: Cache tModLoader
              id: cache-tml
              uses: actions/cache@v4
              with:
                  path: tModLoader.zip
                  key: tmodloader-latest-${{ runner.os }}

            - name: Download tModLoader
              if: steps.cache-tml.outputs.cache-hit != 'true'
              run: curl -sL "https://github.com/tModLoader/tModLoader/releases/latest/download/tModLoader.zip" -o tModLoader.zip

            - name: Extract tModLoader
              run: unzip -qo tModLoader.zip -d "$GITHUB_WORKSPACE"

            - name: Setup tModLoader.targets
              run: cp "$GITHUB_WORKSPACE/tMLMod.targets" "$GITHUB_WORKSPACE/tModLoader.targets"

            - name: Build mod
              run: dotnet build -c Release
              working-directory: LK_Ugrumiy_WP
              env:
                  LD_LIBRARY_PATH: ${{ github.workspace }}/Libraries/Native/Linux

            - name: Find .tmod file
              id: find_tmod
              run: |
                  set -eu
                  TMOD_PATH=$(find "$HOME/.local/share/Terraria/tModLoader/Mods" -name "*.tmod" | head -1)
                  if [[ -z "${TMOD_PATH}" ]]; then
                    echo "No .tmod file produced!" >&2
                    exit 1
                  fi
                  TMOD_NAME=$(basename "${TMOD_PATH}")
                  VERSIONED_NAME="${TMOD_NAME%.tmod}-v${{ steps.ver.outputs.version }}.tmod"
                  cp "${TMOD_PATH}" "${VERSIONED_NAME}"
                  echo "tmod_path=${TMOD_PATH}" >> "$GITHUB_OUTPUT"
                  echo "tmod_name=${TMOD_NAME}" >> "$GITHUB_OUTPUT"
                  echo "versioned_path=${VERSIONED_NAME}" >> "$GITHUB_OUTPUT"
                  echo "Found: ${TMOD_PATH}"
                  echo "Versioned copy: ${VERSIONED_NAME}"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.ver.outputs.tag }}
                  name: ${{ steps.ver.outputs.tag }}
                  generate_release_notes: true
                  body: |
                      ## LevaKost's Ugrumiy Weapon Pack ${{ steps.ver.outputs.tag }}

                      Собрано автоматически из ветки `main` (коммит `${{ github.sha }}`).

                      ### Установка
                      1. Скачайте `.tmod` файл из *Assets* ниже.
                      2. Положите его в:
                         - **Windows:** `%UserProfile%\Documents\My Games\Terraria\tModLoader\Mods\`
                         - **Linux:** `~/.local/share/Terraria/tModLoader/Mods/`
                         - **macOS:** `~/Library/Application Support/Terraria/tModLoader/Mods/`
                      3. Включите мод в tModLoader и перезагрузите.

                      ### Что нового
                      См. список изменений ниже (генерируется GitHub автоматически).
                  files: |
                      ${{ steps.find_tmod.outputs.tmod_path }}
                      ${{ steps.find_tmod.outputs.versioned_path }}
                  fail_on_unmatched_files: true
